name: telecom_app
description: باقات الاتصالات v6

publish_to: 'none'
version: 6.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  intl: ^0.20.2
  url_launcher: ^6.2.4
  share_plus: ^7.2.2
  file_picker: ^8.0.0
  image_picker: ^1.0.7
  path_provider: ^2.1.2
  permission_handler: ^11.3.0
  flutter_contacts: ^1.1.9+2
  record: ^6.0.0
  audioplayers: ^6.0.0
  excel: ^4.0.2
  pdf: ^3.10.8
  printing: ^5.12.0
  open_file: ^3.3.2
  uuid: ^4.3.3
  http: ^1.2.0
  google_fonts: ^6.1.0
  flutter_slidable: ^3.0.1
  cached_network_image: ^3.3.1
  supabase_flutter: ^2.12.4
  flutter_dotenv: ^6.0.0
  device_info_plus: ^10.1.0
  crypto: ^3.0.3
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0d47a1"
  adaptive_icon_foreground: "assets/icon/icon.png"

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/
